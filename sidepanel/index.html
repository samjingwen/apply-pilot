<!doctype html>
<html>
  <head>
    <link rel="stylesheet" type="text/css" href="index.css" />
  </head>
  <body>
    <div class="upload-row">
      <input id="file-upload" type="file" accept="application/pdf" hidden />
      <div id="file-name" class="file-name-text"></div>
      <label for="file-upload" class="upload-btn">Upload resume</label>
    </div>

    <textarea
      id="input-prompt"
      placeholder="Paste job description here"
      cols="30"
      rows="5"
    ></textarea>

    <div class="actions">
      <button id="button-prompt" class="primary" disabled>Run</button>
      <button id="button-reset" class="secondary" disabled>Reset</button>
    </div>

    <div id="response-container" class="response-container" hidden>
      <button
        id="button-copy-response"
        class="icon-button"
        type="button"
        aria-label="Copy response"
        title="Copy response"
        hidden
      >
        <svg
          aria-hidden="true"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="9" y="9" width="13" height="13" rx="2"></rect>
          <path
            d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
          ></path>
        </svg>
      </button>

      <button
        id="button-export-pdf"
        class="icon-button icon-button-below"
        type="button"
        aria-label="Export response as PDF"
        title="Export response as PDF"
        hidden
      >
        <svg
          aria-hidden="true"
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
          ></path>
          <path d="M14 2v6h6"></path>
          <path d="M12 18v-6"></path>
          <path d="M9 15l3 3 3-3"></path>
          <path d="M8 11h8"></path>
        </svg>
      </button>

      <textarea id="response" class="response-textarea" readonly></textarea>
    </div>

    <div id="loading" class="text" hidden><span class="blink">...</span></div>
    <div id="error" class="text" hidden></div>

    <script src="index.js" type="module"></script>
  </body>
</html>
